<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>전문적인 좌석 배치 프로그램</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic:wght@400;700&family=Poppins:wght@600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="slide-container">
    <div class="sidebar">
        <h1>Seat Master</h1>
        <p>학생 명단을 입력하고 버튼을 눌러주세요. 명단이 부족하면 자동으로 공석 처리됩니다.</p>
        
        <textarea id="studentList" placeholder="한 줄에 한 명씩 입력하세요."></textarea>
        
        <div class="btn-group">
            <button id="shuffleBtn"><i class="fa-solid fa-dice"></i> 랜덤 배치 시작</button>
        </div>
    </div>

    <div class="main-classroom">
        <div class="teacher-desk">교 탁</div>
        
        <div class="seats-grid" id="seatsGrid">
            </div>

        <div class="footer-info">
            © 2024 Classroom Management System | Professional Edition
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
